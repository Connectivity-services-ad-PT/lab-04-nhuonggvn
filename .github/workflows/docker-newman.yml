name: Lab04 Docker and Newman Verification

on:
  push:
  pull_request:

jobs:
  docker-newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Lint OpenAPI contract
        run: npm run lint:openapi

      - name: Set up Python for syntax check
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies for check
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax and imports
        run: |
          python -m py_compile src/core_app/main.py
          python -c "import sys; sys.path.insert(0, 'src'); import core_app.main"

      - name: Build Docker image
        run: docker build -t fit4110/iot-ingestion:lab04 .

      - name: Run Docker container, mock servers, and Newman tests
        run: |
          npx prism mock contracts/ai-vision.openapi.yaml --port 4011 --host 0.0.0.0 > prism-vision.log 2>&1 &
          docker run -d --rm \
            --name fit4110-iot-lab04 \
            -p 8000:8000 \
            --env-file .env.example \
            fit4110/iot-ingestion:lab04
          npx wait-on http-get://localhost:8000/health http-get://localhost:4011/health --timeout 30000 || (docker logs fit4110-iot-lab04 && exit 1)
          npm run test:local

      - name: Show container logs on failure
        if: failure()
        run: docker logs fit4110-iot-lab04 || true

      - name: Stop container
        if: always()
        run: docker stop fit4110-iot-lab04 || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab04-newman-reports
          path: reports/
